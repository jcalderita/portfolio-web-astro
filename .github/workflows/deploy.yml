name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - developing
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-26

    steps:
      - name: Select latest stable Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | grep -v beta | sort -V | tail -1)
          sudo xcode-select -s "$LATEST"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ hashFiles('Package.resolved') }}

      - name: Build Swift package
        run: swift build -c release

      - name: Generate site
        run: .build/release/PortfolioSite

      - name: Deploy to Cloudflare Pages
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            npx wrangler pages deploy deploy/ --project-name=jcalderita
          else
            npx wrangler pages deploy deploy/ --project-name=jcalderita --branch=staging
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Publish to social media
        if: github.ref_name == 'main'
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.before }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: swift .github/scripts/publish-social.swift
